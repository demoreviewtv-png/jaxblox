<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JaxBlox Engine - Flight, Water & Respawn Framework</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #00e1ff; border-radius: 3px; }

        /* Home Launcher Panels */
        #home-menu {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #2c3e50, #0f171e); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; transition: opacity 0.5s ease;
        }
        #home-card {
            background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 20px;
            border: 2px solid #00e1ff; text-align: center;
            box-shadow: 0 0 30px rgba(0, 225, 255, 0.3); max-width: 500px; width: 90%;
        }
        #home-card h1 {
            font-size: 2.5rem; margin: 0 0 5px 0; color: #00e1ff;
            text-shadow: 0 0 10px rgba(0, 225, 255, 0.5);
        }
        input.menu-input {
            width: 85%; padding: 10px 15px; border-radius: 20px; border: 2px solid #444;
            background: #222; color: white; font-size: 1rem; text-align: center;
            outline: none; margin-bottom: 15px; transition: border-color 0.3s;
        }
        input.menu-input:focus { border-color: #00e1ff; }
        .search-container {
            display: flex; flex-direction: column; gap: 8px;
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 15px;
        }
        #play-btn {
            background: #00e1ff; color: #111; padding: 12px 50px; font-size: 1.2rem;
            font-weight: bold; border: none; border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 225, 255, 0.4); margin-top: 10px;
        }
        #play-btn:hover { background: #00bcd4; }
        
        /* Gameplay HUD Controls */
        #ui-container {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            display: none; gap: 10px; background: rgba(0,0,0,0.8);
            padding: 10px 15px; border-radius: 12px; border: 1px solid #333;
        }
        .dashboard-btn {
            padding: 8px 14px; border: none; border-radius: 6px;
            font-weight: bold; color: white; cursor: pointer; background: #3a3a3a;
        }
        .dashboard-btn:hover { background: #4a4a4a; }

        /* Studio Editor Sidebar Layouts */
        #studio-sidebar {
            position: absolute; right: 0; top: 0; width: 300px; height: 100vh;
            background: #1e1e1e; border-left: 2px solid #333; z-index: 20;
            color: #ddd; display: none; flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5); font-size: 0.85rem;
        }
        .sidebar-section { border-bottom: 1px solid #333; padding: 15px; }
        .sidebar-title { color: #00e1ff; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .asset-tray { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 5px; }
        .tray-item {
            background: #2a2a2a; border: 1px dashed #555; border-radius: 6px;
            padding: 10px; text-align: center; cursor: grab; color: #fff; font-weight: bold;
        }
        .tray-item:active { cursor: grabbing; background: #333; }
        
        .prop-grid { display: grid; grid-template-columns: 50px 1fr; gap: 8px; align-items: center; margin-bottom: 5px; }
        .prop-grid label { color: #aaa; font-weight: bold; }
        .prop-inputs { display: flex; gap: 4px; }
        .prop-inputs input {
            width: 100%; background: #2b2b2b; border: 1px solid #444; border-radius: 4px;
            color: #fff; padding: 4px; text-align: center; font-size: 0.8rem;
        }
        
        .toggle-container {
            display: flex; justify-content: space-between; align-items: center; 
            background: #2a2a2a; padding: 8px; border-radius: 6px; margin-top: 5px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="home-menu">
        <div id="home-card">
            <h1>JAXBLOX WORLD</h1>
            <p>Roblox Simulation Engine with Liquid Buoyancy Physics</p>
            
            <input type="text" id="username-input" class="menu-input" placeholder="Enter Nickname..." maxlength="15">
            <div class="search-container">
                <input type="text" id="search-room-input" class="menu-input" style="width:90%; margin-bottom:0;" placeholder="Room Code (lobby, obby)">
            </div>
            <div class="search-container" style="background: rgba(255, 0, 85, 0.05); border: 1px dashed rgba(255, 0, 85, 0.3);">
                <input type="password" id="admin-pass-input" class="menu-input" style="width:90%; margin-bottom:0;" placeholder="Editor Password (Leave blank for player mode)">
            </div>
            <button id="play-btn" onclick="enterGame()">LAUNCH WORLD</button>
        </div>
    </div>

    <div id="ui-container">
        <span id="room-indicator" style="color:#00e1ff; font-weight:bold; margin-right:10px; font-size:0.9rem; align-self:center;">ROOM: LOBBY</span>
        <span id="fps-view-indicator" style="color:#ffcc00; font-size:0.8rem; align-self:center; margin-right:10px; display:none;">FIRST PERSON</span>
        <span id="water-status-indicator" style="color:#3399ff; font-size:0.8rem; align-self:center; margin-right:10px; display:none; font-weight:bold;">🌊 SWIMMING</span>
        <span id="fly-status-indicator" style="color:#00ff66; font-size:0.8rem; align-self:center; margin-right:10px; display:none; font-weight:bold;">FLYING (F)</span>
        <button id="jumpout-seat-btn" class="dashboard-btn" style="background:#ff9500; display:none; margin-right:10px;" onclick="jumpOutSeat()">Jump Out (Space)</button>
        <button class="dashboard-btn" style="background:#cc2900;" onclick="exitToHubMenu()">Disconnect</button>
    </div>

    <div id="studio-sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">Global Room Config</div>
            <div class="toggle-container">
                <label style="font-weight:bold;">Players Collide</label>
                <input type="checkbox" id="room-players-collide" onchange="updateRoomGlobalConfig()">
            </div>
            <div class="toggle-container" style="margin-top: 8px; border: 1px solid #00ff66;">
                <label style="font-weight:bold; color:#00ff66;">Fly Mode (F)</label>
                <input type="checkbox" id="studio-fly-toggle" onchange="toggleFlightMode(this.checked)">
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">Toolbox (Drag Shapes)</div>
            <div class="asset-tray">
                <div class="tray-item" draggable="true" ondragstart="setDragAsset('brick')">🧱 Brick</div>
                <div class="tray-item" draggable="true" ondragstart="setDragAsset('sphere')">🔮 Sphere</div>
                <div class="tray-item" draggable="true" ondragstart="setDragAsset('water')" style="border-color:#3399ff; color:#3399ff;">🌊 Water</div>
                <div class="tray-item" draggable="true" ondragstart="setDragAsset('seat')" style="border-color:#ff9500; color:#ff9500;">💺 Seat</div>
            </div>
            <div style="margin-top:8px;">
                <label style="display:block; font-size:11px; color:#aaa; margin-bottom:4px;">Upload Custom Mesh (.glb):</label>
                <input type="file" id="glb-uploader" accept=".glb" style="font-size:11px; width:100%;">
            </div>
        </div>

        <div class="sidebar-section" style="flex:1; overflow-y:auto;">
            <div class="sidebar-title">Properties Inspector</div>
            <div id="no-selection-msg" style="color:#777; font-style:italic; text-align:center; padding:10px 0;">Click an object to drag or inspect</div>
            
            <div id="inspector-controls" style="display:none; flex-direction:column; gap:10px;">
                <div class="prop-grid">
                    <label>Pos</label>
                    <div class="prop-inputs">
                        <input type="number" step="0.5" id="p-x" onchange="updateSelectedProperty()">
                        <input type="number" step="0.5" id="p-y" onchange="updateSelectedProperty()">
                        <input type="number" step="0.5" id="p-z" onchange="updateSelectedProperty()">
                    </div>
                </div>
                <div class="prop-grid">
                    <label>Scale</label>
                    <div class="prop-inputs">
                        <input type="number" step="0.1" min="0.1" id="s-x" onchange="updateSelectedProperty()">
                        <input type="number" step="0.1" min="0.1" id="s-y" onchange="updateSelectedProperty()">
                        <input type="number" step="0.1" min="0.1" id="s-z" onchange="updateSelectedProperty()">
                    </div>
                </div>
                <div class="prop-grid">
                    <label>Rot</label>
                    <div class="prop-inputs">
                        <input type="number" step="5" id="r-x" onchange="updateSelectedProperty()">
                        <input type="number" step="5" id="r-y" onchange="updateSelectedProperty()">
                        <input type="number" step="5" id="r-z" onchange="updateSelectedProperty()">
                    </div>
                </div>
                <div class="prop-grid">
                    <label>Color</label>
                    <input type="color" id="p-color" style="width:100%; height:25px; cursor:pointer;" onchange="updateSelectedProperty()">
                </div>
                <div class="toggle-container">
                    <label style="font-weight:bold; color:#00e1ff;">CanCollide</label>
                    <input type="checkbox" id="p-cancollide" onchange="updateSelectedProperty()">
                </div>
                <div class="toggle-container">
                    <label style="font-weight:bold;">Is Spawn?</label>
                    <input type="checkbox" id="p-spawn" onchange="updateSelectedProperty()">
                </div>
                <button class="dashboard-btn" style="background:#ff3b30; width:100%; margin-top:10px;" onclick="deleteSelectedPart()">Delete Selected Object</button>
            </div>
        </div>

        <div class="sidebar-section" style="background:#151515; display:flex; gap:5px;">
            <button class="dashboard-btn" style="font-size:11px; flex:1; background:#3a3a3a;" onclick="copyMapJSON()">Export JSON</button>
            <button class="dashboard-btn" style="font-size:11px; flex:1; background:#3a3a3a;" onclick="pasteMapOverrideJSON()">Import JSON</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, push, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-8p2zXKL7WNJHkvwukCb6X2YEgkw39jE",
            authDomain: "jaxblox.firebaseapp.com",
            databaseURL: "https://jaxblox-default-rtdb.firebaseio.com", 
            projectId: "jaxblox",
            storageBucket: "jaxblox.firebasestorage.app",
            messagingSenderId: "893095367039",
            appId: "1:893095367039:web:46e38624351daa9f824a4a",
            measurementId: "G-2B5B8E53G7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gltfLoader = new GLTFLoader();
        
        const playerId = "player_" + Math.random().toString(36).substr(2, 9);
        let playerRef = null;
        let activeRoomBlocksRef = null;

        let gameInitialized = false;
        let isStudioMode = false;
        let isFlying = false;
        let inWater = false;
        
        let globalRoomConfig = { playersCollide: false };
        let localData = { 
            id: playerId, username: "Guest",
            x: 0, y: 5, z: 0, rotY: 0, color: Math.random() * 0xffffff, room: 'lobby',
            sittingOn: "", legSwing: 0, isMoving: false, isSubmerged: false
        };
        
        let velocityY = 0;
        let isGrounded = false;
        
        let cameraZoomDistance = 15;
        const minZoom = 0.5, maxZoom = 45;
        let cameraYaw = 0, cameraPitch = 0.6;
        let isRightMouseDown = false, isLeftMouseDown = false;
        let isFirstPerson = false;
        
        let spawnPoint = { x: 0, y: 5, z: 0 }; 
        let draggedAssetType = "";
        let base64MeshString = ""; 

        let remotePlayers = {};
        let currentRoomBlocks = {};
        let selectedBlockId = null, draggingBlockId = null;
        const keys = {};

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a222d);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.05, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 25, 15);
        scene.add(dirLight);

        let playerMeshes = {};
        let blockMap = new Map(); 
        let blockDataArray = [];

        function respawnPlayer() {
            localData.x = spawnPoint.x;
            localData.y = spawnPoint.y + 2; 
            localData.z = spawnPoint.z;
            localData.sittingOn = "";
            velocityY = 0;
            isGrounded = false;
            inWater = false;
            localData.isSubmerged = false;
            document.getElementById('jumpout-seat-btn').style.display = 'none';
            document.getElementById('water-status-indicator').style.display = 'none';
            if(playerRef) set(playerRef, localData);
        }

        window.toggleFlightMode = function(state) {
            if(!isStudioMode) return;
            isFlying = state;
            velocityY = 0;
            document.getElementById('studio-fly-toggle').checked = state;
            document.getElementById('fly-status-indicator').style.display = state ? 'block' : 'none';
        };

        window.setDragAsset = function(type) { draggedAssetType = type; base64MeshString = ""; };

        document.getElementById('glb-uploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) { base64MeshString = evt.target.result; draggedAssetType = "glb"; };
            reader.readAsDataURL(file);
        });

        document.body.addEventListener('dragover', e => e.preventDefault());
        document.body.addEventListener('drop', (e) => {
            if (!isStudioMode || !gameInitialized || !activeRoomBlocksRef || !draggedAssetType) return;
            if (e.clientX > window.innerWidth - 300) return; 

            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -Math.round(localData.y));
            const target = new THREE.Vector3();
            if(raycaster.ray.intersectPlane(plane, target)) {
                push(activeRoomBlocksRef, {
                    type: draggedAssetType,
                    x: Math.round(target.x), y: Math.round(localData.y), z: Math.round(target.z),
                    sx: draggedAssetType==='brick'?2:(draggedAssetType==='seat'?1.6:3), 
                    sy: draggedAssetType==='seat'?0.6:2, 
                    sz: draggedAssetType==='brick'?1:(draggedAssetType==='seat'?1.6:3),
                    rx: 0, ry: 0, rz: 0,
                    color: draggedAssetType==='seat'?"#ff9500":(draggedAssetType==='water'?"#3399ff":"#00e1ff"), 
                    canCollide: (draggedAssetType !== 'water'), // Water shouldn't collide solid by default
                    isSpawn: false,
                    meshData: base64MeshString || ""
                });
            }
            draggedAssetType = ""; 
        });

        window.updateRoomGlobalConfig = function() {
            if(!isStudioMode || !gameInitialized) return;
            set(ref(db, `maps/${localData.room}/config/playersCollide`), document.getElementById('room-players-collide').checked);
        };

        window.updateSelectedProperty = function() {
            if (!selectedBlockId || !activeRoomBlocksRef) return;
            const currentObj = currentRoomBlocks[selectedBlockId];
            if(!currentObj) return;

            const updateObj = {
                x: parseFloat(document.getElementById('p-x').value),
                y: parseFloat(document.getElementById('p-y').value),
                z: parseFloat(document.getElementById('p-z').value),
                sx: parseFloat(document.getElementById('s-x').value) || 1,
                sy: parseFloat(document.getElementById('s-y').value) || 1,
                sz: parseFloat(document.getElementById('s-z').value) || 1,
                rx: parseFloat(document.getElementById('r-x').value) || 0,
                ry: parseFloat(document.getElementById('r-y').value) || 0,
                rz: parseFloat(document.getElementById('r-z').value) || 0,
                color: document.getElementById('p-color').value,
                canCollide: document.getElementById('p-cancollide').checked,
                isSpawn: document.getElementById('p-spawn').checked,
                type: currentObj.type || "brick"
            };
            if(currentObj.meshData) updateObj.meshData = currentObj.meshData;
            set(ref(db, `maps/${localData.room}/blocks/${selectedBlockId}`), updateObj);
        };

        window.deleteSelectedPart = function() {
            if (!selectedBlockId) return;
            remove(ref(db, `maps/${localData.room}/blocks/${selectedBlockId}`));
            closeInspector();
        };

        function openInspector(blockId, blockData) {
            selectedBlockId = blockId;
            document.getElementById('no-selection-msg').style.display = 'none';
            document.getElementById('inspector-controls').style.display = 'flex';
            document.getElementById('p-x').value = blockData.x;
            document.getElementById('p-y').value = blockData.y;
            document.getElementById('p-z').value = blockData.z;
            document.getElementById('s-x').value = blockData.sx || 1;
            document.getElementById('s-y').value = blockData.sy || 1;
            document.getElementById('s-z').value = blockData.sz || 1;
            document.getElementById('r-x').value = blockData.rx || 0;
            document.getElementById('r-y').value = blockData.ry || 0;
            document.getElementById('r-z').value = blockData.rz || 0;
            document.getElementById('p-color').value = blockData.color || "#00e1ff";
            document.getElementById('p-cancollide').checked = (blockData.canCollide !== false);
            document.getElementById('p-spawn').checked = !!blockData.isSpawn;
        }

        function closeInspector() {
            selectedBlockId = null;
            document.getElementById('no-selection-msg').style.display = 'block';
            document.getElementById('inspector-controls').style.display = 'none';
        }

        window.jumpOutSeat = function() {
            if(!localData.sittingOn) return;
            localData.sittingOn = "";
            velocityY = 0.18; 
            localData.y += 1.2;
            document.getElementById('jumpout-seat-btn').style.display = 'none';
        };

        window.enterGame = async function() {
            const nickname = document.getElementById('username-input').value.trim();
            const roomInput = document.getElementById('search-room-input').value.trim().toLowerCase();
            const typedPassword = document.getElementById('admin-pass-input').value.trim();

            localData.username = nickname || "Guest_" + Math.floor(Math.random() * 900);
            localData.room = roomInput || 'lobby';
            
            isStudioMode = false;
            toggleFlightMode(false);
            document.getElementById('studio-sidebar').style.display = 'none';

            const configRef = ref(db, `maps/${localData.room}/config`);
            
            onValue(configRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    globalRoomConfig.playersCollide = !!data.playersCollide;
                    document.getElementById('room-players-collide').checked = globalRoomConfig.playersCollide;
                }
            });

            try {
                const snapshot = await get(configRef);
                if (snapshot.exists()) {
                    const dbConfig = snapshot.val();
                    if (dbConfig.password && typedPassword === dbConfig.password) isStudioMode = true;
                } else if (typedPassword.length > 0) {
                    await set(configRef, { password: typedPassword, playersCollide: false });
                    isStudioMode = true;
                }
            } catch (err) { console.warn(err); }

            document.getElementById('room-indicator').innerText = `ROOM: ${localData.room.toUpperCase()} (${isStudioMode ? 'STUDIO' : 'PLAYER'})`;
            document.getElementById('home-menu').style.opacity = 0;
            
            setTimeout(() => {
                document.getElementById('home-menu').style.display = 'none';
                document.getElementById('ui-container').style.display = 'flex';
                if (isStudioMode) document.getElementById('studio-sidebar').style.display = 'flex';
            }, 500);

            playerRef = ref(db, `players/${playerId}`);
            set(playerRef, localData);
            onDisconnect(playerRef).remove();

            activeRoomBlocksRef = ref(db, `maps/${localData.room}/blocks`);
            onValue(activeRoomBlocksRef, (snap) => {
                currentRoomBlocks = snap.val() || {};
                const keys = Object.keys(currentRoomBlocks);
                let foundSpawn = false;
                for(let i=0; i<keys.length; i++) {
                    if(currentRoomBlocks[keys[i]].isSpawn) {
                        spawnPoint.x = currentRoomBlocks[keys[i]].x;
                        spawnPoint.y = currentRoomBlocks[keys[i]].y;
                        spawnPoint.z = currentRoomBlocks[keys[i]].z;
                        foundSpawn = true;
                        break;
                    }
                }
                if(!foundSpawn) spawnPoint = { x: 0, y: 5, z: 0 };

                rebuildCustomMaps();
                if (selectedBlockId && currentRoomBlocks[selectedBlockId]) {
                    if(draggingBlockId !== selectedBlockId) openInspector(selectedBlockId, currentRoomBlocks[selectedBlockId]);
                } else if (selectedBlockId) {
                    closeInspector();
                }
                if(!gameInitialized) respawnPlayer();
                gameInitialized = true;
            });
        };

        window.exitToHubMenu = function() {
            gameInitialized = false;
            if(playerRef) set(playerRef, null);
            closeInspector();
            draggingBlockId = null;
            toggleFlightMode(false);
            Object.keys(playerMeshes).forEach(id => scene.remove(playerMeshes[id]));
            playerMeshes = {};
            rebuildCustomMaps(); 

            document.getElementById('ui-container').style.display = 'none';
            document.getElementById('studio-sidebar').style.display = 'none';
            document.getElementById('home-menu').style.display = 'flex';
            setTimeout(() => { document.getElementById('home-menu').style.opacity = 1; }, 50);
        };

        window.copyMapJSON = function() {
            if (!currentRoomBlocks || Object.keys(currentRoomBlocks).length === 0) return alert("No blocks found.");
            navigator.clipboard.writeText(JSON.stringify(currentRoomBlocks, null, 2)).then(() => alert("Map configuration copied!"));
        };

        window.pasteMapOverrideJSON = async function() {
            const rawPaste = prompt("Paste map JSON:");
            if (!rawPaste) return;
            try {
                const parsed = JSON.parse(rawPaste);
                if (confirm("Replace existing configurations?")) {
                    await remove(activeRoomBlocksRef);
                    await set(activeRoomBlocksRef, parsed);
                }
            } catch (err) { alert("Parsing Exception Encountered."); }
        };

        function rebuildCustomMaps() {
            blockMap.forEach(mesh => scene.remove(mesh));
            blockMap.clear();
            blockDataArray = [];

            Object.keys(currentRoomBlocks).forEach(key => {
                const b = currentRoomBlocks[key];
                const colorHex = b.isSpawn ? 0xffd700 : (b.color || 0x00e1ff);
                
                let geometry;
                if (b.type === 'sphere') {
                    geometry = new THREE.SphereGeometry(0.5, 32, 32);
                } else if (b.type === 'torus') {
                    geometry = new THREE.TorusGeometry(0.4, 0.15, 16, 64);
                } else { 
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                }

                let material;
                if (b.type === 'water') {
                    material = new THREE.MeshStandardMaterial({ color: 0x3399ff, transparent: true, opacity: 0.6, roughness: 0.1 });
                } else {
                    material = new THREE.MeshStandardMaterial({ color: colorHex });
                    if (b.canCollide === false) { material.transparent = true; material.opacity = 0.6; }
                }

                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(b.x, b.y, b.z);
                mesh.scale.set(b.sx || 1, b.sy || 1, b.sz || 1);
                mesh.rotation.set(THREE.MathUtils.degToRad(b.rx || 0), THREE.MathUtils.degToRad(b.ry || 0), THREE.MathUtils.degToRad(b.rz || 0));

                mesh.userData = { blockId: key, isSeat: (b.type === 'seat'), isWater: (b.type === 'water') };
                scene.add(mesh);
                blockMap.set(key, mesh);

                blockDataArray.push({
                    id: key, x: b.x, y: b.y, z: b.z,
                    w: b.sx || 1, h: b.sy || 1, d: b.sz || 1,
                    isSeat: (b.type === 'seat'),
                    isWater: (b.type === 'water'),
                    canCollide: b.type === 'water' ? false : (b.canCollide !== false)
                });
            });
        }

        window.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('mousedown', e => { 
            if (e.button === 2) isRightMouseDown = true; 
            if (e.button === 0) isLeftMouseDown = true;
        });

        window.addEventListener('mouseup', e => { 
            if (e.button === 2) isRightMouseDown = false; 
            if (e.button === 0) {
                isLeftMouseDown = false;
                if (draggingBlockId && activeRoomBlocksRef) {
                    const b = currentRoomBlocks[draggingBlockId];
                    if (b) {
                        set(ref(db, `maps/${localData.room}/blocks/${draggingBlockId}/x`), b.x);
                        set(ref(db, `maps/${localData.room}/blocks/${draggingBlockId}/z`), b.z);
                    }
                }
                draggingBlockId = null;
            }
        });

        window.addEventListener('mousemove', e => {
            if (isRightMouseDown && gameInitialized) {
                cameraYaw -= e.movementX * 0.005;
                cameraPitch = Math.max(-Math.PI/2.2, Math.min(Math.PI / 2.1, cameraPitch + e.movementY * 0.005));
                return;
            }

            if (isLeftMouseDown && isStudioMode && draggingBlockId && gameInitialized) {
                const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);

                const currentObj = currentRoomBlocks[draggingBlockId];
                if(currentObj) {
                    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -currentObj.y);
                    const target = new THREE.Vector3();
                    if(raycaster.ray.intersectPlane(plane, target)) {
                        currentObj.x = Math.round(target.x * 2) / 2;
                        currentObj.z = Math.round(target.z * 2) / 2;
                        const visualMesh = blockMap.get(draggingBlockId);
                        if(visualMesh) { visualMesh.position.x = currentObj.x; visualMesh.position.z = currentObj.z; }
                        if(selectedBlockId === draggingBlockId) {
                            document.getElementById('p-x').value = currentObj.x;
                            document.getElementById('p-z').value = currentObj.z;
                        }
                    }
                }
            }
        });

        window.addEventListener('pointerdown', (e) => {
            if (!gameInitialized || e.button === 2) return;
            if (e.clientX > window.innerWidth - 300 || e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;

            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const intersectables = [];
            blockMap.forEach(mesh => intersectables.push(mesh));

            const intersects = raycaster.intersectObjects(intersectables, true);
            if (intersects.length > 0) {
                let rootObj = intersects[0].object;
                while (rootObj.parent && !rootObj.userData.blockId && rootObj.parent !== scene) {
                    rootObj = rootObj.parent;
                }
                const hitId = rootObj.userData.blockId;
                if (hitId && currentRoomBlocks[hitId]) {
                    openInspector(hitId, currentRoomBlocks[hitId]);
                    if (isStudioMode) draggingBlockId = hitId; 
                    return;
                }
            }
            if(!draggingBlockId) closeInspector(); 
        });

        window.addEventListener('wheel', e => {
            if (!gameInitialized) return;
            cameraZoomDistance = Math.max(minZoom, Math.min(maxZoom, cameraZoomDistance + e.deltaY * 0.03));
            if(cameraZoomDistance <= 0.8) {
                isFirstPerson = true;
                document.getElementById('fps-view-indicator').style.display = 'block';
            } else {
                isFirstPerson = false;
                document.getElementById('fps-view-indicator').style.display = 'none';
            }
        });

        function createPlayerModel(colorHex) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: colorHex });
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffcc99 });

            const torso = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.2, 0.5), mat);
            torso.position.y = 1.6; 
            torso.name = "torso";
            group.add(torso);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skinMat);
            head.position.y = 2.45;
            head.name = "head";
            group.add(head);

            const leftArmPivot = new THREE.Group(); leftArmPivot.position.set(-0.7, 2.1, 0); leftArmPivot.name = "leftArmPivot";
            const leftArmMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), mat); leftArmMesh.position.y = -0.5;
            leftArmPivot.add(leftArmMesh); group.add(leftArmPivot);

            const rightArmPivot = new THREE.Group(); rightArmPivot.position.set(0.7, 2.1, 0); rightArmPivot.name = "rightArmPivot";
            const rightArmMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), mat); rightArmMesh.position.y = -0.5;
            rightArmPivot.add(rightArmMesh); group.add(rightArmPivot);

            const leftLegPivot = new THREE.Group(); leftLegPivot.position.set(-0.26, 1.0, 0); leftLegPivot.name = "leftLegPivot";
            const leftLegMesh = new THREE.Mesh(new THREE.BoxGeometry(0.44, 1.0, 0.44), mat); leftLegMesh.position.y = -0.5;
            leftLegPivot.add(leftLegMesh); group.add(leftLegPivot);

            const rightLegPivot = new THREE.Group(); rightLegPivot.position.set(0.26, 1.0, 0); rightLegPivot.name = "rightLegPivot";
            const rightLegMesh = new THREE.Mesh(new THREE.BoxGeometry(0.44, 1.0, 0.44), mat); rightLegMesh.position.y = -0.5;
            rightLegPivot.add(rightLegMesh); group.add(rightLegPivot);

            return group;
        }

        function createNameTag(text) {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.roundRect ? ctx.roundRect(0, 0, 256, 64, 10) : ctx.fillRect(0, 0, 256, 64); ctx.fill();
            ctx.font = 'bold 24px Arial'; ctx.fillStyle = '#00e1ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 32);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            sprite.scale.set(3.5, 0.8, 1); sprite.position.y = 3.0; return sprite;
        }

        window.addEventListener('keydown', e => {
            if(document.activeElement.tagName === 'INPUT') return;
            keys[e.key.toLowerCase()] = true;
            if(e.key === ' ' && localData.sittingOn) jumpOutSeat();
            
            if(e.key.toLowerCase() === 'f' && isStudioMode) {
                toggleFlightMode(!isFlying);
            }
        });
        window.addEventListener('keyup', e => {
            if(document.activeElement.tagName === 'INPUT') return;
            keys[e.key.toLowerCase()] = false;
        });
        
        onValue(ref(db, 'players'), snap => { if(gameInitialized) remotePlayers = snap.val() || {}; });

        function animate() {
            requestAnimationFrame(animate);

            if (gameInitialized) {
                let speed = isFlying ? 0.25 : (inWater ? 0.07 : 0.12);
                let forwardX = Math.sin(cameraYaw), forwardZ = Math.cos(cameraYaw);
                let rightX = Math.cos(cameraYaw), rightZ = -Math.sin(cameraYaw);
                let moveX = 0, moveZ = 0;

                if (localData.sittingOn && currentRoomBlocks[localData.sittingOn]) {
                    const seat = currentRoomBlocks[localData.sittingOn];
                    localData.x = seat.x;
                    localData.y = seat.y + (seat.sy/2 || 0.3) + 0.3;
                    localData.z = seat.z;
                    localData.rotY = THREE.MathUtils.degToRad(seat.ry || 0);
                    velocityY = 0;
                    isGrounded = true;
                    localData.isMoving = false;
                    document.getElementById('jumpout-seat-btn').style.display = 'block';
                } else {
                    if (keys['w'] || keys['arrowup']) { moveX -= forwardX; moveZ -= forwardZ; }
                    if (keys['s'] || keys['arrowdown']) { moveX += forwardX; moveZ += forwardZ; }
                    if (keys['a'] || keys['arrowleft']) { moveX -= rightX; moveZ -= rightZ; }
                    if (keys['d'] || keys['arrowright']) { moveX += rightX; moveZ += rightZ; }

                    let nextX = localData.x;
                    let nextZ = localData.z;

                    if (moveX !== 0 || moveZ !== 0) {
                        let len = Math.sqrt(moveX * moveX + moveZ * moveZ);
                        nextX += (moveX / len) * speed; 
                        nextZ += (moveZ / len) * speed;
                        localData.isMoving = true;
                        localData.rotY = isFirstPerson ? (cameraYaw + Math.PI) : Math.atan2(-moveX, -moveZ);
                    } else {
                        localData.isMoving = false;
                        if(isFirstPerson) localData.rotY = cameraYaw + Math.PI;
                    }

                    let nextY = localData.y;
                    
                    // Pre-check if player is inside any Water volumes
                    let playerRadius = 0.4;
                    let playerHeight = 2.0;
                    let currentlyInWater = false;

                    blockDataArray.forEach(b => {
                        if (!b.isWater) return;
                        let withinX = localData.x >= b.x - b.w/2 && localData.x <= b.x + b.w/2;
                        let withinY = localData.y + 1.0 >= b.y - b.h/2 && localData.y <= b.y + b.h/2; // check torso line
                        let withinZ = localData.z >= b.z - b.d/2 && localData.z <= b.z + b.d/2;
                        if (withinX && withinY && withinZ) currentlyInWater = true;
                    });
                    
                    inWater = currentlyInWater;
                    localData.isSubmerged = inWater;
                    document.getElementById('water-status-indicator').style.display = inWater ? 'block' : 'none';

                    if (isFlying || inWater) {
                        isGrounded = false;
                        velocityY = 0;
                        if (keys[' ']) nextY += speed;
                        if (keys['shift']) nextY -= speed;
                        
                        // Apply fluid buoyancy damping if just drifting
                        if (!keys[' '] && !keys['shift'] && inWater) {
                            nextY -= 0.01; // slow natural sinking
                        }

                        localData.x = nextX;
                        localData.z = nextZ;
                        localData.y = nextY;
                    } else {
                        // Standard physical gravity calculation
                        if (keys[' '] && isGrounded) { velocityY = 0.2; isGrounded = false; }
                        velocityY -= 0.009; 
                        nextY += velocityY;

                        if (nextY < -25) {
                            respawnPlayer();
                            return; 
                        }

                        // X-Axis Collision
                        let xCollides = false;
                        blockDataArray.forEach(b => {
                            if (!b.canCollide) return;
                            let withinX = nextX + playerRadius >= b.x - b.w/2 && nextX - playerRadius <= b.x + b.w/2;
                            let withinY = localData.y + playerHeight >= b.y - b.h/2 && localData.y <= b.y + b.h/2;
                            let withinZ = localData.z + playerRadius >= b.z - b.d/2 && localData.z - playerRadius <= b.z + b.d/2;
                            if (withinX && withinY && withinZ) { xCollides = true; }
                        });
                        if (!xCollides) localData.x = nextX;

                        // Z-Axis Collision
                        let zCollides = false;
                        blockDataArray.forEach(b => {
                            if (!b.canCollide) return;
                            let withinX = localData.x + playerRadius >= b.x - b.w/2 && localData.x - playerRadius <= b.x + b.w/2;
                            let withinY = localData.y + playerHeight >= b.y - b.h/2 && localData.y <= b.y + b.h/2;
                            let withinZ = nextZ + playerRadius >= b.z - b.d/2 && nextZ - playerRadius <= b.z + b.d/2;
                            if (withinX && withinY && withinZ) { zCollides = true; }
                        });
                        if (!zCollides) localData.z = nextZ;

                        // Mutual Player Pushback Collision Matrix
                        if (globalRoomConfig.playersCollide) {
                            Object.keys(remotePlayers).forEach(id => {
                                if (id === playerId || remotePlayers[id].room !== localData.room) return;
                                let rp = remotePlayers[id];
                                let dx = localData.x - rp.x;
                                let dz = localData.z - rp.z;
                                let dist = Math.sqrt(dx*dx + dz*dz);
                                let minDist = playerRadius * 2;
                                if (dist < minDist && dist > 0.01) {
                                    let overlap = minDist - dist;
                                    localData.x += (dx / dist) * overlap * 0.5;
                                    localData.z += (dz / dist) * overlap * 0.5;
                                }
                            });
                        }

                        // Y-Axis Floor Snap resolution loop
                        let groundHit = false;
                        blockDataArray.forEach(b => {
                            let withinX = localData.x + playerRadius >= b.x - b.w/2 && localData.x - playerRadius <= b.x + b.w/2;
                            let withinZ = localData.z + playerRadius >= b.z - b.d/2 && localData.z - playerRadius <= b.z + b.d/2;
                            if (withinX && withinZ) {
                                let surfaceTop = b.y + b.h/2;
                                if (velocityY <= 0 && nextY >= surfaceTop - 0.4 && nextY <= surfaceTop + 0.15) {
                                    if (b.isSeat && !localData.sittingOn) {
                                        localData.sittingOn = b.id;
                                    } else if (b.canCollide) {
                                        nextY = surfaceTop; velocityY = 0; isGrounded = true; groundHit = true;
                                    }
                                }
                            }
                        });

                        if (!groundHit && !localData.sittingOn) isGrounded = false;
                        if (!groundHit) localData.y = nextY;
                    }
                }

                localData.legSwing = (localData.isMoving && !isFlying) ? (inWater ? Math.sin(Date.now() * 0.008) * 0.4 : Math.sin(Date.now() * 0.014) * 0.65) : 0;
                if(playerRef) set(playerRef, localData);
            }

            if (gameInitialized && !playerMeshes[playerId]) {
                const group = new THREE.Group();
                group.add(createPlayerModel(localData.color)); 
                group.add(createNameTag(localData.username + " (You)"));
                playerMeshes[playerId] = group; scene.add(group);
            }
            
            function updateLimbAnimations(meshGroup, isMoving, swingAngle, isSitting, isSubmerged) {
                const leftLegPivot = meshGroup.getObjectByName("leftLegPivot");
                const rightLegPivot = meshGroup.getObjectByName("rightLegPivot");
                const leftArmPivot = meshGroup.getObjectByName("leftArmPivot");
                const rightArmPivot = meshGroup.getObjectByName("rightArmPivot");
                const torso = meshGroup.getObjectByName("torso");

                if (isSitting) {
                    if(torso) torso.rotation.x = 0;
                    if(leftLegPivot) leftLegPivot.rotation.set(-Math.PI / 2, 0, 0);
                    if(rightLegPivot) rightLegPivot.rotation.set(-Math.PI / 2, 0, 0);
                    if(leftArmPivot) leftArmPivot.rotation.set(-Math.PI / 5, 0, 0);
                    if(rightArmPivot) rightArmPivot.rotation.set(-Math.PI / 5, 0, 0);
                } else if (isSubmerged) {
                    // Tilted crawl animation style for swimming inside water
                    if(torso) torso.rotation.x = Math.PI / 4;
                    if(leftLegPivot) leftLegPivot.rotation.set(swingAngle, 0, 0);
                    if(rightLegPivot) rightLegPivot.rotation.set(-swingAngle, 0, 0);
                    if(leftArmPivot) leftArmPivot.rotation.set(Math.PI/2 + swingAngle, 0, 0);
                    if(rightArmPivot) rightArmPivot.rotation.set(Math.PI/2 - swingAngle, 0, 0);
                } else {
                    if(torso) torso.rotation.x = 0;
                    if(leftLegPivot) leftLegPivot.rotation.set(swingAngle, 0, 0);
                    if(rightLegPivot) rightLegPivot.rotation.set(-swingAngle, 0, 0);
                    if(leftArmPivot) leftArmPivot.rotation.set(-swingAngle * 0.9, 0, 0);
                    if(rightArmPivot) rightArmPivot.rotation.set(swingAngle * 0.9, 0, 0);
                }
            }

            if (playerMeshes[playerId] && gameInitialized) {
                playerMeshes[playerId].position.set(localData.x, localData.y, localData.z);
                playerMeshes[playerId].rotation.y = localData.rotY;
                updateLimbAnimations(playerMeshes[playerId], localData.isMoving, localData.legSwing, !!localData.sittingOn, localData.isSubmerged);

                const headNode = playerMeshes[playerId].getObjectByName("head");
                const torsoNode = playerMeshes[playerId].getObjectByName("torso");
                if (isFirstPerson) {
                    if(headNode) headNode.visible = false; 
                    if(torsoNode) torsoNode.visible = false;
                } else {
                    if(headNode) headNode.visible = true;
                    if(torsoNode) torsoNode.visible = true;
                }
            }

            Object.keys(playerMeshes).forEach(id => {
                const targetPool = gameInitialized ? remotePlayers : {};
                if (id !== playerId && (!targetPool[id] || targetPool[id].room !== localData.room)) {
                    scene.remove(playerMeshes[id]); delete playerMeshes[id];
                }
            });

            const activeSyncPool = gameInitialized ? remotePlayers : {};
            Object.keys(activeSyncPool).forEach(id => {
                if (id === playerId || activeSyncPool[id].room !== localData.room) return;
                if (!playerMeshes[id]) {
                    const group = new THREE.Group(); 
                    group.add(createPlayerModel(activeSyncPool[id].color));
                    group.add(createNameTag(activeSyncPool[id].username || "Guest"));
                    playerMeshes[id] = group; scene.add(group);
                }
                const p = activeSyncPool[id];
                playerMeshes[id].position.x += (p.x - playerMeshes[id].position.x) * 0.3;
                playerMeshes[id].position.y += (p.y - playerMeshes[id].position.y) * 0.3;
                playerMeshes[id].position.z += (p.z - playerMeshes[id].position.z) * 0.3;
                playerMeshes[id].rotation.y = p.rotY || 0;
                updateLimbAnimations(playerMeshes[id], p.isMoving, p.legSwing || 0, !!p.sittingOn, p.isSubmerged);
            });

            const trackingTarget = playerMeshes[playerId];
            if(trackingTarget && gameInitialized) {
                const headHeight = localData.sittingOn ? 2.05 : 2.45;
                const targetX = trackingTarget.position.x;
                const targetY = trackingTarget.position.y + headHeight; 
                const targetZ = trackingTarget.position.z;

                if (isFirstPerson) {
                    camera.position.set(targetX, targetY, targetZ);
                    const lookTarget = new THREE.Vector3(
                        targetX - Math.sin(cameraYaw) * Math.cos(cameraPitch),
                        targetY - Math.sin(cameraPitch),
                        targetZ - Math.cos(cameraYaw) * Math.cos(cameraPitch)
                    );
                    camera.lookAt(lookTarget);
                } else {
                    const offsetX = cameraZoomDistance * Math.sin(cameraYaw) * Math.cos(cameraPitch);
                    const offsetY = cameraZoomDistance * Math.sin(cameraPitch);
                    const offsetZ = cameraZoomDistance * Math.cos(cameraYaw) * Math.cos(cameraPitch);
                    camera.position.set(targetX + offsetX, targetY + offsetY, targetZ + offsetZ);
                    camera.lookAt(targetX, targetY - 0.7, targetZ);
                }
            } else {
                camera.position.set(0, 15, 20); camera.lookAt(0, 0, 0);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
